# .github/workflows/pipelines.yml
# Automated daily MLB data pipelines for Baseline MLB
name: MLB Data Pipelines
on:
  schedule:
    # Morning: fetch schedule + rosters (8:00 AM ET = 12:00 UTC during EDT)
    - cron: "0 12 * * *"
    # Late morning: props refresh + generate projections (10:30 AM ET = 14:30 UTC)
    - cron: "30 14 * * *"
    # Afternoon: props refresh + update projections (4:30 PM ET = 20:30 UTC)
    - cron: "30 20 * * *"
    # Overnight: Statcast ingest + grade accuracy (2:00 AM ET = 06:00 UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

jobs:
  # -- Check if we should run (skip off-season: Nov 16 – Feb 14) --
  season-check:
    runs-on: ubuntu-latest
    outputs:
      is_active: ${{ steps.check.outputs.active }}
    steps:
      - name: Check if MLB season is active
        id: check
        run: |
          MONTH=$(date +%m)
          DAY=$(date +%d)
          # Off-season: Nov 16 – Feb 14
          if [[ ($MONTH -eq 11 && $DAY -ge 16) || $MONTH -eq 12 || $MONTH -eq 1 || ($MONTH -eq 2 && $DAY -le 14) ]]; then
            echo "Off-season detected ($MONTH-$DAY). Skipping pipelines."
            echo "active=false" >> $GITHUB_OUTPUT
          else
            echo "Season active ($MONTH-$DAY). Running pipelines."
            echo "active=true" >> $GITHUB_OUTPUT
          fi

  # -- Morning Pipeline: Schedule + Rosters --
  fetch-games-players:
    needs: season-check
    if: |
      needs.season-check.outputs.is_active == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 12 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch and upsert games
        run: python pipeline/fetch_games.py
      - name: Fetch and upsert players
        run: python pipeline/fetch_players.py

  # -- Late Morning Pipeline: Props + Projections --
  morning-props-projections:
    needs: season-check
    if: |
      needs.season-check.outputs.is_active == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.event.schedule == '30 14 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch props
        run: python pipeline/fetch_props.py
      - name: Generate pitcher projections
        run: python pipeline/generate_projections.py
      - name: Generate batter projections
        run: python pipeline/generate_batter_projections.py

  # -- Afternoon Pipeline: Props Refresh + Update Projections --
  afternoon-props-projections:
    needs: season-check
    if: |
      needs.season-check.outputs.is_active == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.event.schedule == '30 20 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch props
        run: python pipeline/fetch_props.py
      - name: Generate pitcher projections
        run: python pipeline/generate_projections.py
      - name: Generate batter projections
        run: python pipeline/generate_batter_projections.py

  # -- Overnight Pipeline: Statcast + Accuracy Grading --
  overnight-statcast-grading:
    needs: season-check
    if: |
      needs.season-check.outputs.is_active == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch Statcast data
        run: python scripts/fetch_statcast.py
      - name: Grade accuracy
        run: python scripts/grade_accuracy.py
      - name: Track CLV
        run: python scripts/track_clv.py
      - name: Compute umpire framing composites
        run: python pipeline/fetch_umpire_framing.py

  # -- Lint check (runs on all triggers) --
  lint:
    needs: season-check
    if: needs.season-check.outputs.is_active == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install linting tools
        run: pip install ruff
      - name: Run ruff linter
        run: ruff check pipeline/ scripts/ lib/ --select E,F,W --ignore E501
        continue-on-error: true

  # -- Notify on failure --
  notify-on-failure:
    needs: [fetch-games-players, morning-props-projections, afternoon-props-projections, overnight-statcast-grading]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report pipeline failure
        run: |
          echo "::error::One or more BaselineMLB pipeline jobs failed."
          echo "Check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Future: send Slack/Discord/email notification here
          # curl -X POST "$WEBHOOK_URL" -H "Content-Type: application/json" \
          #   -d "{\"text\": \"BaselineMLB pipeline failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
