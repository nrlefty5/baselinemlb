# .github/workflows/pipelines.yml
# Automated daily MLB data pipelines for Baseline MLB
#
# v2.0 Changes:
#   - Morning pipeline: consolidated to use pipeline/ only (removed scripts/fetch_games.py, scripts/fetch_players.py)
#   - Props: consolidated to use pipeline/fetch_props.py only (removed scripts/fetch_props.py)
#   - Added pytest run on morning pipeline
#   - Overnight: still uses scripts/ for Statcast + grading (these are unique, not duplicates)
name: MLB Data Pipelines
on:
  schedule:
    # Morning: fetch schedule + rosters (8:00 AM ET = 12:00 UTC during EDT)
    - cron: "0 12 * * *"
    # Late morning: props refresh + generate projections (10:30 AM ET = 14:30 UTC)
    - cron: "30 14 * * *"
    # Afternoon: props refresh + update projections (4:30 PM ET = 20:30 UTC)
    - cron: "30 20 * * *"
    # Overnight: Statcast ingest + grade accuracy (2:00 AM ET = 06:00 UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
jobs:
  # -- Morning Pipeline: Schedule + Rosters (consolidated to pipeline/ only)
  fetch-games-players:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true
      - name: Fetch & upsert games to Supabase
        run: python pipeline/fetch_games.py
      - name: Fetch & upsert players to Supabase (with handedness)
        run: python pipeline/fetch_players.py
      - name: Fetch WBC games (sportId=51)
        run: python scripts/fetch_wbc_games.py

  # -- Late Morning Pipeline: Props + Projections
  morning-props-projections:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 14 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch props (consolidated to pipeline/)
        run: python pipeline/fetch_props.py
      - name: Generate v2.0 pitcher projections
        run: python pipeline/generate_projections.py
      - name: Generate v2.0 batter projections
        run: python pipeline/generate_batter_projections.py
      - name: Generate daily content
        run: python scripts/generate_daily_content.py --format all --top 5

  # -- Afternoon Pipeline: Props Refresh + Update Projections
  afternoon-props-projections:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 20 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch props (consolidated to pipeline/)
        run: python pipeline/fetch_props.py
      - name: Generate v2.0 pitcher projections
        run: python pipeline/generate_projections.py
      - name: Generate v2.0 batter projections
        run: python pipeline/generate_batter_projections.py
      - name: Generate daily content
        run: python scripts/generate_daily_content.py --format all --top 5

  # -- Overnight Pipeline: Statcast + Accuracy Grading
  # Note: scripts/fetch_statcast.py, scripts/grade_accuracy.py, scripts/track_clv.py
  # are unique (not duplicates of pipeline/) and remain here.
  overnight-statcast-grading:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch Statcast data
        run: python scripts/fetch_statcast.py
      - name: Grade accuracy
        run: python scripts/grade_accuracy.py
      - name: Track CLV
        run: python scripts/track_clv.py
      - name: Compute umpire framing composites
        run: python pipeline/fetch_umpire_framing.py
